; ============================================================
;  AquaLeaf — Intelligent Plant Irrigation Platform
;  PlatformIO Project Configuration
;  Target: ESP8266 NodeMCU v1.0 (4MB Flash)
; ============================================================

[platformio]
default_envs = nodemcu_v2
description   = AquaLeaf Intelligent Plant Irrigation Platform

; ──────────────────────────────────────────────────────────
;  Shared / common settings
; ──────────────────────────────────────────────────────────
[common]
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_WIFI
    -DCORE_DEBUG_LEVEL=1
    -DAQUA_VERSION=\"1.0.0\"
    -DAQUA_BUILD_DATE=\"__DATE__\"
    -Os
    -Wall

; ──────────────────────────────────────────────────────────
;  Shared library dependencies
; ──────────────────────────────────────────────────────────
[libs]
lib_deps =
    knolleary/PubSubClient @ ^2.8.0
    blynkkk/Blynk          @ ^1.3.2
    bblanchon/ArduinoJson  @ ^7.2.1
    paulstoffregen/Time    @ ^1.6.1
    tzapu/WiFiManager      @ ^2.0.17

; ──────────────────────────────────────────────────────────
;  NodeMCU v2 (ESP-12E / ESP8266EX) — primary target
; ──────────────────────────────────────────────────────────
[env:nodemcu_v2]
platform      = espressif8266 @ ^4.2.1
board         = nodemcuv2
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
build_flags   = ${common.build_flags}
lib_deps      = ${libs.lib_deps}

; Filesystem (SPIFFS) for web dashboard assets
board_build.filesystem = spiffs

; Extra scripts for serial output formatting
extra_scripts =
    pre:scripts/pre_build.py

; ──────────────────────────────────────────────────────────
;  NodeMCU v3 (ESP-12F) — alternate target
; ──────────────────────────────────────────────────────────
[env:nodemcu_v3]
platform      = espressif8266 @ ^4.2.1
board         = nodemcuv2
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
build_flags   = ${common.build_flags} -DNODEMCU_V3
lib_deps      = ${libs.lib_deps}
board_build.filesystem = spiffs

; ──────────────────────────────────────────────────────────
;  Unit-test environment (native)
; ──────────────────────────────────────────────────────────
[env:native_test]
platform  = native
build_flags =
    -DUNIT_TEST
    -std=c++17
lib_deps  =
    bblanchon/ArduinoJson @ ^7.2.1
